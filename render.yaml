services:
  - type: web
    name: bookingproject
    runtime: python
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: "pip install --no-cache-dir -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn bookingproject.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true

      - key: DJANGO_SETTINGS_MODULE
        value: "bookingproject.settings"
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://i-soceanic-tour-bookng-system-bcnr.vercel.app,https://i-soceanic-tour-bookng-system-ippa.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://i-soceanic-tour-bookng-system-bcnr.vercel.app,https://i-soceanic-tour-bookng-system-ippa.vercel.app"
